<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 32 32">
  <defs>
    <clipPath id="faviconClip">
      <rect width="32" height="32" rx="6" />
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0f1419" />
  <!-- Respaldo si aún no hay logo en public/grupo-purdy-logo.png -->
  <text
    x="16"
    y="21"
    font-family="system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="10"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
  >
    DS
  </text>
  <!-- Logo de la app (mismo archivo que usa el panel; no editar ese PNG aquí). -->
  <image
    width="32"
    height="32"
    href="/grupo-purdy-logo.png"
    xlink:href="/grupo-purdy-logo.png"
    clip-path="url(#faviconClip)"
    preserveAspectRatio="xMidYMid meet"
  />
</svg>
