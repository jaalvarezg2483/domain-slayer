<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DomainSlayer</title>
    <meta
      name="description"
      content="DomainSlayer: inventario de sitios web, certificados SSL, dominios y alertas."
    />
    <meta name="theme-color" content="#121820" />

    <!-- Vista previa al compartir enlace (WhatsApp, Teams, LinkedIn, etc.): Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DomainSlayer" />
    <meta property="og:locale" content="es_CR" />
    <meta property="og:title" content="DomainSlayer" />
    <meta
      property="og:description"
      content="Inventario de sitios web, SSL, dominios y alertas."
    />
    <meta property="og:image" content="%VITE_SITE_URL%/grupo-purdy-logo.png" />
    <meta property="og:image:alt" content="DomainSlayer" />

    <!-- Twitter / X (misma idea que Open Graph) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DomainSlayer" />
    <meta
      name="twitter:description"
      content="Inventario de sitios web, SSL, dominios y alertas."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/grupo-purdy-logo.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Icono para guardar en pantalla de inicio / algunas previews -->
    <link rel="apple-touch-icon" href="/grupo-purdy-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
